<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Quad · Innlogging</title>
<style>
  :root {
    --dyp: #0f2a32;
    --dyp-2: #143840;
    --teal: #2f8f86;
    --sand: #efe9dd;
    --sand-2: #e3dbca;
    --blekk: #0a1c21;
    --tekst: #f4f1ea;
    --dempet: #9fb3b3;
    --feil: #d98b6a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    background: radial-gradient(120% 120% at 50% 0%, var(--dyp-2), var(--blekk) 70%);
    color: var(--tekst);
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .kort {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 40px 32px;
    backdrop-filter: blur(6px);
  }
  .merke {
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    font-size: 13px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--teal);
    margin: 0 0 4px;
  }
  h1 {
    font-family: ui-serif, Georgia, serif;
    font-weight: 500;
    font-size: 26px;
    margin: 0 0 28px;
    letter-spacing: -0.01em;
  }
  label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--dempet);
    margin: 0 0 6px;
  }
  input {
    width: 100%;
    padding: 11px 13px;
    margin-bottom: 18px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--tekst);
    font-size: 15px;
  }
  input:focus {
    outline: 2px solid var(--teal);
    outline-offset: 1px;
    border-color: transparent;
  }
  button {
    width: 100%;
    padding: 12px;
    border: 0;
    border-radius: 8px;
    background: var(--teal);
    color: #04211d;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.02em;
    cursor: pointer;
  }
  button:hover { background: #37a59a; }
  .feil {
    background: rgba(217,139,106,0.12);
    border: 1px solid rgba(217,139,106,0.4);
    color: var(--feil);
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 8px;
    margin-bottom: 18px;
  }
  .fot {
    margin-top: 22px;
    font-size: 12px;
    color: var(--dempet);
    text-align: center;
  }
</style>
</head>
<body>
  <form class="kort" method="POST" action="/login">
    <p class="merke">Quad AS</p>
    <h1>Investeringsoversikt</h1>
    <div id="feilboks" class="feil" hidden>Feil brukernavn eller passord.</div>
    <label for="brukernavn">Brukernavn</label>
    <input id="brukernavn" name="brukernavn" autocomplete="username" required autofocus />
    <label for="passord">Passord</label>
    <input id="passord" name="passord" type="password" autocomplete="current-password" required />
    <button type="submit">Logg inn</button>
    <p class="fot">Privat side. All tilgang logges.</p>
  </form>
  <script>
    if (new URLSearchParams(location.search).get("feil")) {
      document.getElementById("feilboks").hidden = false;
    }
  </script>
</body>
</html>
