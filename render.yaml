services:
  - type: web
    name: quad-invest
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      - key: DROPBOX_REFRESH_TOKEN
        sync: false
      - key: DROPBOX_FILE_PATH
        sync: false
      - key: AUTH_USER
        sync: false
      - key: AUTH_PASS
        sync: false
      - key: SESSION_SECRET
        generateValue: true
